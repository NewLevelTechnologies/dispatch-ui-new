<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dispatch-ui-new</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    />
    <script>
      // Sets theme-light/theme-dark (and accent-cool) on <html> before React
      // mounts so first paint matches the persisted theme. Mirror of
      // themeBootstrapScript in src/components/ThemeProvider.tsx.
      //
      // Default = light + cool. `system` resolves to the OS color-scheme
      // preference on every load so the user's OS theme follows through.
      (function () {
        try {
          var m = localStorage.getItem('theme-mode') || 'light';
          var a = localStorage.getItem('theme-accent') || 'cool';
          var resolved = m;
          if (m === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.add('theme-' + resolved);
          if (a === 'cool') document.documentElement.classList.add('accent-cool');
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
